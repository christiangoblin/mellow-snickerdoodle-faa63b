<!DOCTYPE html>
<html>
  <body>
    <!-- This file exists only so Netlify registers the application form at build time. -->
    <!-- It is never shown to users. -->
    <form name="application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="organization" />
      <input type="text" name="application-type" />
      <input type="text" name="address" />
      <textarea name="description"></textarea>
      <input type="text" name="timeline" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
